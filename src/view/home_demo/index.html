<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Pokémon Rivalry · Home</title>
  <link rel="stylesheet" href="../inter_fonts/inter.css">
  <link rel="stylesheet" href="../fontawesome-free-7.2.0-web/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<video autoplay muted loop playsinline id="bgVideo">
  <source src="pokemon_bg.mp4" type="video/mp4">
</video>
<div class="app-wrapper">
  
  <header class="main-header">
    <div class="brand">
      <h1>Pokémon <span>Rivalry</span></h1>
    </div>
    
    <div class="user-panel">
      <div class="user-info">
        <i class="fas fa-user-astronaut"></i>
        <span class="username">User</span>
      </div>
      <div class="score-badge">
        <i class="fas fa-star"></i> 1250
      </div>
      <button class="logout-btn" id="logoutBtn">
        <i class="fas fa-sign-out-alt"></i> Exit
      </button>
    </div>
  </header>

  <div class="home-center">
    
    <div class="battle-panel">
      <div class="battle-title">
        <i class="fas fa-crosshairs"></i> Battle
      </div>
      <div class="mode-selector">
        <button class="mode-btn active" data-mode="random">
          <i class="fas fa-random"></i> Random
        </button>
        <button class="mode-btn" data-mode="challenge">
          <i class="fas fa-magnifying-glass"></i> Challenge
        </button>
      </div>
      
      <div class="battle-actions">
        <div class="random-action" id="randomAction">
          <button class="start-btn" id="findOpponentBtn">
            <i class="fas fa-play"></i> Find opponent
          </button>
        </div>
        
        <div class="challenge-action" id="challengeAction">
          <div class="search-row">
            <input type="text" placeholder="Enter rival's username..." id="rivalUsername">
            <button id="challengeBtn">
              <i class="fas fa-crosshairs"></i> Challenge
            </button>
          </div>
        </div>
      </div>
    </div>
    
    <div class="teambuilder-card" id="teambuilderCard">
      <div class="teambuilder-left">
        <i class="fas fa-people-group"></i>
        <div class="teambuilder-text">
          <h2>Team Builder</h2>
          <p>Create & manage your team</p>
        </div>
      </div>
      <i class="fas fa-chevron-right"></i>
    </div>
    
    <div class="active-team">
      <div class="active-team-header">
        <h3><i class="fas fa-layer-group"></i> Active Team: Team1</h3>
      </div>
      <div class="team-cards" id="teamCards"></div>
    </div>

    <div class="game-description">
      <i class="fas fa-circle" style="font-size: 0.25rem; vertical-align: middle; margin: 0 4px;"></i>
      Competitive Pokémon battles · build your team, challenge rivals, climb the ranks
      <i class="fas fa-circle" style="font-size: 0.25rem; vertical-align: middle; margin: 0 4px;"></i>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
